spring:
  application:
    name: order-service

  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

# Application-specific configuration
app:
  cors:
    # Origins allowed to call the API from another origin (browser). The bundled test-harness is
    # served same-origin on 8080, so it needs no CORS; these are for an external frontend.
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
  payment:
    # Max amount for a single CREDIT_CARD payment; larger orders are declined (-> 422 + rollback).
    # Bank transfer and crypto are limitless.
    credit-card-limit: 10000

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.transaction: DEBUG
    org.springframework.retry: DEBUG
    com.example.orderservice: DEBUG
