# Single-command startup. H2 is in-memory, so no separate database service is needed.
services:
  order-service:
    build: .
    image: order-service:latest
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      # In a container, the host browser is a "remote" client, which H2 blocks by default.
      # Enable it only here; the local application.yml keeps the secure default (false).
      - SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS=true
    restart: unless-stopped
